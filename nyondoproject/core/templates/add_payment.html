{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
          <h3 class="mb-0">Add Payment</h3>
        </div>

        <div class="card-body">
          <form method="POST">
            {% csrf_token %}

            <!-- CREDIT PURCHASE -->

            <div class="mb-3">
              <label class="form-label"> Credit Purchase </label>

              <select name="credit_purchase"
        class="form-select"
        required>

    <option value="">
        Select Credit Purchase
    </option>

    {% for credit in credits %}

    <option value="{{ credit.id }}">

        {{ credit.customer.full_name }}
        -
        {{ credit.product.name }}
        -
        Balance: {{ credit.balance }}

    </option>

    {% endfor %}

</select>
            </div>

            <!-- AMOUNT -->

            <div class="mb-3">
              <label class="form-label"> Amount Paid </label>

              <input
                type="number"
                step="0.01"
                min="1"
                name="amount_paid"
                class="form-control"
                required
              />
            </div>

            <!-- CASHIER -->

            <div class="mb-3">
              <label class="form-label"> Cashier Name </label>

              <input
                type="text"
                name="cashier_name"
                class="form-control"
                required
              />
            </div>

            <!-- PAYMENT METHOD -->

            <div class="mb-3">
              <label class="form-label"> Payment Method </label>

              <select name="payment_method" class="form-select">
                <option value="Cash">Cash</option>

                <option value="Mobile Money">Mobile Money</option>

                <option value="Bank">Bank</option>
              </select>
            </div>

            <!-- BUTTONS -->

            <div class="d-flex justify-content-between">
              <a href="{% url 'payments' %}" class="btn btn-secondary">
                Back
              </a>

              <button type="submit" class="btn btn-success">
                Save Payment
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
