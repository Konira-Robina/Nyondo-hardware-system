{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4">
        <!-- CARD HEADER -->

        <div class="card-header bg-success text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h3>Add Sale</h3>

                <a href="{% url 'sales' %}" class="btn btn-light"> View Sales </a>
            </div>
        </div>

        <!-- CARD BODY -->

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="row">
                    <!-- SALES REPRESENTATIVE -->

                    <div class="col-md-6 mb-3">
                        <label class="form-label"> Sales Representative </label>

                        <input type="text" name="sales_representative" class="form-control"
                            placeholder="Enter sales representative" required />
                    </div>

                    <!-- CUSTOMER NAME -->

                    <div class="col-md-6 mb-3">
                        <label class="form-label"> Customer Name </label>

                        <input type="text" name="customer_name" class="form-control" placeholder="Enter customer name"
                            required />
                    </div>
                </div>

                <div class="row">
                    <!-- ADDRESS -->

                    <div class="col-md-6 mb-3">
                        <label class="form-label"> Address </label>

                        <input type="text" name="address" class="form-control" placeholder="Enter customer address"
                            required />
                    </div>

                    <!-- PHONE NUMBER -->

                    <div class="col-md-6 mb-3">
                        <label class="form-label"> Phone Number </label>

                        <input type="text" name="phone_number" class="form-control" placeholder="Enter phone number"
                            required />
                    </div>
                </div>

                <div class="row">
                    <!-- CUSTOMER TYPE -->

                    <div class="col-md-6 mb-3">
                        <label class="form-label"> Customer Type </label>

                        <select name="customer_type" class="form-select" required>
                            <option value="">Select Customer Type</option>

                            <option value="Retail">Retail</option>

                            <option value="Wholesale">Wholesale</option>
                        </select>
                    </div>

                    <!-- PRODUCT -->

                    <div class="col-md-6 mb-3">
                        <label class="form-label"> Product </label>

                        <select name="product_name" class="form-select" required>

                            <option value=""> Select Product</option>
                            {% for product in products %}
                            <option value="{{ product.id }}">
                                {{ product.product_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row">
                    <!-- QUANTITY -->

                    <div class="col-md-4 mb-3">
                        <label class="form-label"> Quantity </label>

                        <input type="number" name="quantity" class="form-control" placeholder="Enter quantity"
                            required />
                    </div>

                    <!-- SELLING PRICE -->

                    <div class="col-md-4 mb-3">
                        <label class="form-label"> Selling Price </label>

                        <input type="number" step="0.01" name="selling_price" class="form-control"
                            placeholder="Enter selling price" required />
                    </div>

                    <!-- TOTAL AMOUNT -->
                    <!-- <div class="col-md-4 mb-3">
                        <label class="form-label"> Total Amount </label>

                        <input type="number" step="0.01" name="total_amount" class="form-control"
                            placeholder="Total amount" required />
                    </div> -->

                    <!-- TRANSPORT FEE -->

                    <div class="col-md-4 mb-3">
                        <label class="form-label"> Transport Fee </label>

                        <input type="number" step="0.01" name="transport_fee" class="form-control" value="0" />
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="reset" class="btn btn-secondary">Reset</button>

                    <button type="submit" class="btn btn-success px-5">Save Sale</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
