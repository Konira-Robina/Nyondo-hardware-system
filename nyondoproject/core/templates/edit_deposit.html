{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
  <div class="card shadow-lg border-0 rounded-4">
    <div class="card-header bg-warning">
      <div class="d-flex justify-content-between">
        <h3>Edit Deposit</h3>
        <a href="{% url 'deposits' %}" class="btn btn-dark"> Back </a>
      </div>
    </div>

    <div class="card-body">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label"> Customer </label>

          <select name="customer" class="form-select" required>
            {% for customer in customers %}

            <option
              value="{{ customer.id }}"
              {%
              if
              deposit.customer.id=""
              ="customer.id"
              %}selected{%
              endif
              %}
            >
              {{ customer.full_name }}
            </option>

            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label"> Amount </label>

          <input
            type="number"
            step="0.01"
            name="amount"
            value="{{ deposit.amount }}"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label"> Balance </label>

          <input
            type="number"
            step="0.01"
            name="balance"
            value="{{ deposit.balance }}"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label"> Payment Status </label>

          <select name="payment_status" class="form-select">
            <option
              value="Pending"
              {%
              if
              deposit.payment_status=""
              ="Pending"
              %}selected{%
              endif
              %}
            >
              Pending
            </option>

            <option
              value="Completed"
              {%
              if
              deposit.payment_status=""
              ="Completed"
              %}selected{%
              endif
              %}
            >
              Completed
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label"> Description </label>

          <textarea name="description" class="form-control">
{{ deposit.description }}</textarea
          >
        </div>

        <button type="submit" class="btn btn-warning w-100">
          Update Deposit
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
