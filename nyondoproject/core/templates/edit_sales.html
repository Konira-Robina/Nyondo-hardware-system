{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
  <div class="card shadow-lg border-0 rounded-4">
    <!-- HEADER -->

    <div class="card-header bg-warning text-dark">
      <div class="d-flex justify-content-between align-items-center">
        <h3>Edit Sale</h3>

        <a href="{% url 'sales' %}" class="btn btn-dark"> Back To Sales </a>
      </div>
    </div>

    <!-- BODY -->

    <div class="card-body">
      <form method="POST">
        {% csrf_token %}

        <!-- ROW 1 -->

        <div class="row">
          <!-- SALES REPRESENTATIVE -->

          <div class="col-md-6 mb-3">
            <label class="form-label"> Sales Representative </label>

            <input
              type="text"
              name="sales_representative"
              value="{{ sale.sales_representative }}"
              class="form-control"
              required
            />
          </div>

          <!-- CUSTOMER NAME -->

          <div class="col-md-6 mb-3">
            <label class="form-label"> Customer Name </label>

            <input
              type="text"
              name="customer_name"
              value="{{ sale.customer_name }}"
              class="form-control"
              required
            />
          </div>
        </div>

        <!-- ROW 2 -->

        <div class="row">
          <!-- ADDRESS -->

          <div class="col-md-6 mb-3">
            <label class="form-label"> Address </label>

            <input
              type="text"
              name="address"
              value="{{ sale.address }}"
              class="form-control"
              required
            />
          </div>

          <!-- PHONE NUMBER -->

          <div class="col-md-6 mb-3">
            <label class="form-label"> Phone Number </label>

            <input
              type="text"
              name="phone_number"
              value="{{ sale.phone_number }}"
              class="form-control"
              required
            />
          </div>
        </div>

        <!-- ROW 3 -->

        <div class="row">
          <!-- CUSTOMER TYPE -->

          <div class="col-md-6 mb-3">
            <select name="customer_type" class="form-select">
              <option value="{{ sale.customer_type }}">
                {{ sale.customer_type }}
              </option>

              <option value="Retail">Retail</option>

              <option value="Wholesale">Wholesale</option>
            </select>
          </div>

          <!-- PRODUCT -->

          <div class="col-md-6 mb-3">
            <label class="form-label"> Product </label>

            <select name="product_name" class="form-select" required>
              {% for product in products %}

              <option
                value="{{ product.id }}"
                {%
                if
                sale.product_name.id=""
                ="product.id"
                %}selected{%
                endif
                %}
              >
                {{ product.name }}
              </option>

              {% endfor %}
            </select>
          </div>
        </div>

        <!-- ROW 4 -->

        <div class="row">
          <!-- QUANTITY -->

          <div class="col-md-4 mb-3">
            <label class="form-label"> Quantity </label>

            <input
              type="number"
              name="quantity"
              value="{{ sale.quantity }}"
              class="form-control"
              required
            />
          </div>

          <!-- SELLING PRICE -->

          <div class="col-md-4 mb-3">
            <label class="form-label"> Selling Price </label>

            <input
              type="number"
              step="0.01"
              name="selling_price"
              value="{{ sale.selling_price }}"
              class="form-control"
              required
            />
          </div>

          <!-- TRANSPORT FEE -->

          <div class="col-md-4 mb-3">
            <label class="form-label"> Transport Fee </label>

            <input
              type="number"
              step="0.01"
              name="transport_fee"
              value="{{ sale.transport_fee }}"
              class="form-control"
            />
          </div>
        </div>

        <!-- TOTAL AMOUNT -->

        <div class="mb-3">
          <label class="form-label"> Total Amount </label>

          <input
            type="text"
            value="{{ sale.total_amount }}"
            class="form-control bg-light"
            readonly
          />
        </div>

        <!-- BUTTONS -->

        <div class="d-flex justify-content-end gap-2">
          <a href="{% url 'sales' %}" class="btn btn-secondary"> Cancel </a>

          <button type="submit" class="btn btn-warning px-5">
            Update Sale
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
