{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Edit Sale</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <input type="text"
                       name="customer_name"
                       value="{{ sale.customer_name }}"
                       class="form-control mb-3">

                <input type="number"
                       name="quantity"
                       value="{{ sale.quantity }}"
                       class="form-control mb-3">

                <input type="number"
                       step="0.01"
                       name="selling_price"
                       value="{{ sale.selling_price }}"
                       class="form-control mb-3">

                <button class="btn btn-success">

                    Update Sale

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
