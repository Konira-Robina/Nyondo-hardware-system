{% block content %}

<style>
  .card:hover {
    transform: translateY(20px);
    box-shadow: 20px;
  }

  .input {
    background-color: black;
  }
</style>
<form style="background-color:rgb(194, 212, 247);">
  {% csrf_token %}
  <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Sales System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll"
        aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>

  </nav>
  <div class="container" style="background-color:black;">
    <!-- Content here -->
    <div class="card shadow">
      <div class="container-fluid">
        <h1 style="text-align: center; background-color: rgb(103, 103, 218);">Nyondo Sales Registration Form</h1>
      </div>
      <div style="display: flex;">
        <div class="col-md-6">
          <label for="date">Sales Date</label>
          <input type="date" name="date">
        </div>
        <div class="col-md-6">
          <label for="salesPerson">Sales Person</label>
          <select>
            <option value="">Select a representative</option>
            <option value="1">Konra Mitchell</option>
            <option value="2">Robina Keyla</option>
          </select>
        </div>
      </div>
      <div class="shadow-lg p-3 mb-5 bg-body-tertiary rounded">
        <h4>Customer Details</h4>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="customer_name" class="form-label">Customer Name</label>
            <input type="text" name="customer_name" class="form-control" id="inputEmail4">
          </div>
          <div class="col-md-6">
            <label for="phone_number" class="form-label">Phone Number</label>
            <input type="number" name="phone_number" class="form-control" id="inputPassword4">
          </div>
          <div class="row g-2">
            <div class="col-md-6">
              <label for="address" class="form-label">Address</label>
              <input type="text" name="address" class="form-control" id="inputEmail4">
            </div>
            <div class="col-md-6">
              <label for="CustomerType">Customer Type</label><br>
              <select>
                <option value="">Select Customer Type</option>
                <option value="1" name="whole_seller">Whole Seller</option>
                <option value="2" name="retailer">Retailer</option>
                <option value="2" name="trader">Trader</option>
                <option value="3" name="other">Other</option>
              </select>
            </div>
          </div>
          <h4>Item</h4>
          <div class="col-md-3">
            <label for="product_name" class="form-label">Product Name</label>
            <input type="text" name="product_name" class="form-control" id="inputCity">
          </div>
          <div class="col-md-3">
            <label for="product_category" class="form-label">Product Category</label>
            <input type="text" name="product_category" class="form-control" id="inputCity">
          </div>
          <div class="col-md-3">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" id="inputCity">
          </div>
          <div class="col-md-3">
            <label for="price" class="form-label">Selling Price</label>
            <input type="number" name="price" class="form-control" id="inputZip">
          </div>
          <div class="col-md-3">
            <label for="price" class="form-label">Total Amount</label>
            <input type="number" name="total_amount" class="form-control" id="inputZip">
          </div>
          <div class="col-md-3">
            <label for="price" class="form-label">Transport Fee</label>
            <input type="number" name="transport_fee" class="form-control" id="inputZip">
          </div>
          <a href="{% url 'save_sales' %}">Save</a>

        </div>
      </div>
    </div>
  </div>
  <footer style="text-align: center;"> Sales Management System © 2026</footer>
</form>
{% endblock %}
