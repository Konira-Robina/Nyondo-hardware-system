{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-warning">
            <h3>Edit Product</h3>
        </div>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <!-- PRODUCT NAME -->

                <div class="mb-3">
                    <label class="form-label"> Product Name </label>

                    <input type="text" name="name" value="{{ product.name }}" class="form-control" />
                </div>
                  <!-- CATEGORY -->

                <div class="mb-3">
                    <label class="form-label"> Category </label>

                    <input type="text" name="category" value="{{ product.category }}" class="form-control" />
                </div>

                <!-- BUYING PRICE -->

                <div class="mb-3">
                    <label class="form-label"> Buying Price </label>

                    <input type="number" step="0.01" name="unit_cost" value="{{ product.unit_cost }}"
                        class="form-control" />
                </div>

                <!-- SELLING PRICE -->

                <div class="mb-3">
                    <label class="form-label"> Selling Price </label>

                    <input type="number" step="0.01" name="selling_price" value="{{ product.selling_price }}"
                        class="form-control" />
                </div>

                <!-- STOCK -->

                <div class="mb-3">
                    <label class="form-label"> Stock Quantity </label>

                    <input type="number" name="stock_quantity" value="{{ product.stock_quantity }}"
                        class="form-control"/>
                </div>

                <button type="submit" class="btn btn-success">Update Product</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
