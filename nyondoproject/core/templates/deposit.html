{% extends 'base.html' %}
{% block content %}

<h3>Deposit</h3>

<form method="POST">
    {% csrf_token %}

    <select name="customer" class="form-control mb-2">
        {% for c in customers %}
        <option value="{{ c.id }}">{{ c.full_name }}</option>
        {% endfor %}
    </select>

    <input type="number" name="amount" placeholder="Amount" class="form-control mb-2">

    <button class="btn btn-success">Deposit</button>
</form>

{% endblock %}
