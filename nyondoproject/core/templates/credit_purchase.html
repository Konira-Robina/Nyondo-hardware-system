
{% extends 'base.html' %}
{% block content %}

<h3>Pick Goods (Credit Scheme)</h3>

<form method="POST">
    {% csrf_token %}

    <select name="customer" class="form-control mb-2">
        {% for c in customers %}
        <option value="{{ c.id }}">{{ c.full_name }}</option>
        {% endfor %}
    </select>

    <select name="product" class="form-control mb-2">
        {% for p in products %}
        <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
    </select>

    <input type="number" name="quantity" class="form-control mb-2" placeholder="Quantity">

    <button class="btn btn-primary">Confirm</button>
</form>

{% endblock %}
